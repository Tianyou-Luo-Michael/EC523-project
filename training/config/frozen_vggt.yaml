defaults:
  - default_dataset.yaml

exp_name: frozen_vggt_exp001
img_size: 518
patch_size: 14
num_workers: 0
seed_value: 42
accum_steps: 1
val_epoch_freq: 5
max_img_per_gpu: 8

limit_train_batches: 500
limit_val_batches: 100

max_epochs: 10

clip_model_name: "ViT-B/32"
vggt_model_name: "facebook/VGGT-1B"
adapter_dim: 512
caption_manifest_path: /projectnb/ec523/projects/proj_vggt/dataset/co3d_curated_captions_train.jsonl
caption_mode: "concise"
margin: 0.05
margin_loss_weight: 0.5

enable_camera: True
enable_depth: True
enable_point: True
enable_track: False

model:
  _target_: vggt.models.frozen_vggt.FrozenVGGT

data:
  train:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: False
      repeat_batch: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.co3d.Co3dDataset
          split: train
          CO3D_DIR: /projectnb/ec523/projects/proj_vggt/dataset/co3d_curated/
          CO3D_ANNOTATION_DIR: /projectnb/ec523/projects/proj_vggt/dataset/co3d_curated_anno_split/
  val:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.co3d.Co3dDataset
          split: test
          CO3D_DIR: /projectnb/ec523/projects/proj_vggt/dataset/co3d_curated/
          CO3D_ANNOTATION_DIR: /projectnb/ec523/projects/proj_vggt/dataset/co3d_curated_anno_split/

logging:
  log_dir: logs/${exp_name}
  log_visuals: False
  log_freq: 10
  log_level_primary: DEBUG
  log_level_secondary: WARNING
  all_ranks: False
  tensorboard_writer:
    _target_: train_utils.tb_writer.TensorBoardLogger
    path: ${logging.log_dir}/tensorboard
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_conf_depth
        - loss_reg_depth
        - loss_grad_depth
        - loss_margin
        - loss_conf_point
        - loss_reg_point
        - loss_grad_point
    val:
      keys_to_log:
        - loss_objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_conf_depth
        - loss_reg_depth
        - loss_grad_depth

checkpoint:
  save_dir: logs/${exp_name}/ckpts
  save_freq: 5
  resume_checkpoint_path: null
  strict: False

loss:
  _target_: loss.MultitaskLoss
  camera:
    weight: 5.0
    loss_type: "l1"
  depth:
    weight: 1.0
    gradient_loss_fn: "grad"
    valid_range: 0.98
  point:
    weight: 1.0
    gradient_loss_fn: "grad"
    valid_range: 0.98
  track: null

optim:
  param_group_modifiers: False

  optimizer:
    _target_: torch.optim.AdamW
    lr: 1e-4
    weight_decay: 1e-2
    betas: [0.9, 0.999]

  frozen_module_names: null

  amp:
    enabled: True
    amp_dtype: bfloat16

  gradient_clip:
    _target_: train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["adapter"]
        max_norm: 1.0
        norm_type: 2

  options: null

distributed:
  backend: nccl
  comms_dtype: null
  find_unused_parameters: False
  timeout_mins: 30
  gradient_as_bucket_view: True
  bucket_cap_mb: 25
  broadcast_buffers: True

cuda:
  cudnn_deterministic: False
  cudnn_benchmark: False
  allow_tf32: True
