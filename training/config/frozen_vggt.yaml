defaults:
  - default_dataset.yaml

# ─────────────────────────────────────────────────────────────────────────────
# FrozenVGGT training config
#
# Only the CrossAttentionAdapter (~3.4 M params) is trained.
# VGGT aggregator + heads (1.2 B params) and CLIP (~400 M params) are frozen.
# ─────────────────────────────────────────────────────────────────────────────

exp_name: frozen_vggt_exp001
img_size: 518
patch_size: 14
num_workers: 8
seed_value: 42
accum_steps: 1          # increase if OOM; gradient accumulation is supported
val_epoch_freq: 5
max_img_per_gpu: 16     # lower than vanilla VGGT because two forward passes per step

limit_train_batches: 500
limit_val_batches: 100

max_epochs: 30

# ── FrozenVGGT-specific trainer kwargs ───────────────────────────────────────
# These are passed directly to FrozenVGGTTrainer.__init__.

clip_model_name: "ViT-B/32"          # "ViT-L/14" supported; d_text auto-set to 768
vggt_model_name: "facebook/VGGT-1B"  # HuggingFace model ID
adapter_dim: 512                      # bottleneck dim of CrossAttentionAdapter
caption_manifest_path: null           # path/to/captions.jsonl  (null = no captions)
caption_mode: "concise"               # "concise" or "descriptive"
margin: 0.05                          # depth margin for caption margin loss
margin_loss_weight: 0.5               # weight on the margin loss term

# VGGT head enable flags (passed through to FrozenVGGT init via **vggt_kwargs)
enable_camera: True
enable_depth: True
enable_point: False   # set True + add point loss below to enable 3D point head
enable_track: False

# ── Dummy model section (not used by FrozenVGGTTrainer._setup_components) ────
# Kept so Hydra parses the config cleanly; _target_ is informational only.
model:
  _target_: vggt.models.frozen_vggt.FrozenVGGT

# ── Data ─────────────────────────────────────────────────────────────────────
data:
  train:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: False
      repeat_batch: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.co3d.Co3dDataset
          split: train
          CO3D_DIR: /YOUR/PATH/TO/CO3D
          CO3D_ANNOTATION_DIR: /YOUR/PATH/TO/CO3D_ANNOTATION
  val:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.co3d.Co3dDataset
          split: test
          CO3D_DIR: /YOUR/PATH/TO/CO3D
          CO3D_ANNOTATION_DIR: /YOUR/PATH/TO/CO3D_ANNOTATION

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  log_dir: logs/${exp_name}
  log_visuals: False
  log_freq: 10
  log_level_primary: DEBUG
  log_level_secondary: WARNING
  all_ranks: False
  tensorboard_writer:
    _target_: train_utils.tb_writer.TensorBoardLogger
    path: ${logging.log_dir}/tensorboard
  scalar_keys_to_log:
    train:
      keys_to_log:
        - objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_conf_depth
        - loss_reg_depth
        - loss_grad_depth
        - loss_margin         # FrozenVGGT-specific: caption margin loss
    val:
      keys_to_log:
        - objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_conf_depth
        - loss_reg_depth
        - loss_grad_depth

# ── Checkpoint ────────────────────────────────────────────────────────────────
# Only adapter weights are saved (not VGGT or CLIP).
checkpoint:
  save_dir: logs/${exp_name}/ckpts
  save_freq: 5                     # also save checkpoint_N every N epochs
  resume_checkpoint_path: null     # set to path/to/checkpoint.pt to resume
  strict: False

# ── Loss ──────────────────────────────────────────────────────────────────────
# MultitaskLoss handles camera + depth supervision.
# The margin loss is computed inside FrozenVGGTTrainer._step (not here).
loss:
  _target_: loss.MultitaskLoss
  camera:
    weight: 5.0
    loss_type: "l1"
  depth:
    weight: 1.0
    gradient_loss_fn: "grad"
    valid_range: 0.98
  point: null
  track: null

# ── Optimizer ─────────────────────────────────────────────────────────────────
# All VGGT params have requires_grad=False, so AdamW only updates adapter params.
# No frozen_module_names needed: freezing is handled inside FrozenVGGT.__init__.
optim:
  param_group_modifiers: False

  optimizer:
    _target_: torch.optim.AdamW
    lr: 1e-4
    weight_decay: 1e-2
    betas: [0.9, 0.999]

  frozen_module_names: null     # DO NOT set — FrozenVGGT handles its own freezing

  amp:
    enabled: True
    amp_dtype: bfloat16

  gradient_clip:
    _target_: train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["adapter"]
        max_norm: 1.0
        norm_type: 2

  options: null   # No fvcore LR scheduler — use plain AdamW with fixed LR.
                  # Uncomment below to enable cosine warm-up decay:
  # options:
  #   lr:
  #     - scheduler:
  #         _target_: fvcore.common.param_scheduler.CompositeParamScheduler
  #         schedulers:
  #           - _target_: fvcore.common.param_scheduler.LinearParamScheduler
  #             start_value: 1e-6
  #             end_value: 1e-4
  #           - _target_: fvcore.common.param_scheduler.CosineParamScheduler
  #             start_value: 1e-4
  #             end_value: 1e-7
  #         lengths: [0.05, 0.95]
  #         interval_scaling: ['rescaled', 'rescaled']

# ── Distribution ──────────────────────────────────────────────────────────────
distributed:
  backend: nccl
  comms_dtype: null
  find_unused_parameters: False   # adapter is always used when captions provided
  timeout_mins: 30
  gradient_as_bucket_view: True
  bucket_cap_mb: 25
  broadcast_buffers: True

cuda:
  cudnn_deterministic: False
  cudnn_benchmark: False
  allow_tf32: True
