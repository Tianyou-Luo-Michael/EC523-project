defaults:
  - default_dataset.yaml

# ─────────────────────────────────────────────────────────────────────────────
# VGGTTextOnly training config
#
# The text encoder (student) is trained to match the frozen image aggregator
# (teacher) via per-block alignment loss.  Downstream prediction heads are
# also trained end-to-end with task supervision when GT annotations are
# available.
#
# Usage (single GPU):
#   python launch_vggt_textonly.py --config vggt_textonly
#
# Usage (multi-GPU, 4 GPUs):
#   torchrun --nproc_per_node=4 launch_vggt_textonly.py --config vggt_textonly
# ─────────────────────────────────────────────────────────────────────────────

exp_name: vggt_textonly_exp001
img_size: 518
patch_size: 14
num_workers: 8
seed_value: 42
accum_steps: 1          # increase if OOM; gradient accumulation is supported
val_epoch_freq: 5
max_img_per_gpu: 16     # lower than vanilla VGGT due to dual encoder forward

limit_train_batches: 500
limit_val_batches: 100

max_epochs: 50

# ── VGGTTextOnly trainer kwargs ──────────────────────────────────────────────
# Passed directly to VGGTTextOnlyTrainer.__init__.

# Pretrained text backbone used by TextEncoder.
text_model_name: "sentence-transformers/all-MiniLM-L6-v2"
freeze_text_backbone: false

# Pretrained VGGT used to initialise the aggregator + heads.
vggt_model_name: "facebook/VGGT-1B"

# Alignment loss weights (alignment_loss = mse_weight * MSE + cosine_weight * (1-cos)).
alignment_weight: 1.0    # scale on the total alignment loss term
mse_weight: 0.5          # relative weight of MSE inside alignment_loss
cosine_weight: 0.5       # relative weight of cosine-similarity inside alignment_loss

# Scale on the task supervision loss (depth / camera / points).
# Set to 0.0 to train with alignment only (no GT annotations required).
task_weight: 0.1

# Number of gradient steps before downstream heads are unfrozen.
# During warm-up only the text encoder trains so the alignment signal
# stabilises before heads start receiving mixed gradients.
freeze_heads_steps: 500

# Caption manifest: path to a JSONL file with {"seq_name": ..., "concise": ..., "descriptive": ...}.
# Set to null if your dataset provides captions directly in the batch (batch["captions"]).
caption_manifest_path: /projectnb/ec523/projects/proj_vggt/dataset/co3d_curated_captions_train.jsonl
caption_mode: "descriptive"    # "concise" or "descriptive"

# Head enable flags
enable_camera: true
enable_depth: true
enable_point: false   # enable + add point loss below for 3-D point supervision

# ── Dummy model section ───────────────────────────────────────────────────────
# Not used by VGGTTextOnlyTrainer._setup_components (which builds the model
# directly).  Kept so Hydra parses the config without errors.
model:
  _target_: vggt.models.vggt_textonly.VGGTTextOnly

# ── Data ─────────────────────────────────────────────────────────────────────
data:
  train:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: False
      repeat_batch: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.co3d.Co3dDataset
          split: train
          CO3D_DIR: /projectnb/ec523/projects/proj_vggt/dataset/co3d_curated
          CO3D_ANNOTATION_DIR: /projectnb/ec523/projects/proj_vggt/dataset/co3d_curated_anno_split
  val:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.co3d.Co3dDataset
          split: test
          CO3D_DIR: /projectnb/ec523/projects/proj_vggt/dataset/co3d_curated
          CO3D_ANNOTATION_DIR: /projectnb/ec523/projects/proj_vggt/dataset/co3d_curated_anno_split

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  log_dir: logs/${exp_name}
  log_visuals: False
  log_freq: 10
  log_level_primary: DEBUG
  log_level_secondary: WARNING
  all_ranks: False
  tensorboard_writer:
    _target_: train_utils.tb_writer.TensorBoardLogger
    path: ${logging.log_dir}/tensorboard
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_objective
        - loss_align          # alignment loss (text ↔ image teacher)
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_conf_depth
        - loss_reg_depth
        - loss_grad_depth
    val:
      keys_to_log:
        - loss_objective
        - loss_align
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_conf_depth
        - loss_reg_depth
        - loss_grad_depth

# ── Checkpoint ────────────────────────────────────────────────────────────────
# Only text_encoder + head weights are saved.
# The aggregator (pretrained VGGT) and CLIP backbone are reloaded at run time.
checkpoint:
  save_dir: logs/${exp_name}/ckpts
  save_freq: 5                      # also save checkpoint_N every N epochs
  resume_checkpoint_path: null      # set to path/to/checkpoint.pt to resume
  strict: False

# ── Loss ──────────────────────────────────────────────────────────────────────
# MultitaskLoss handles depth + camera task supervision.
# The alignment loss is computed inside VGGTTextOnlyTrainer._step.
loss:
  _target_: loss.MultitaskLoss
  camera:
    weight: 5.0
    loss_type: "l1"
  depth:
    weight: 1.0
    gradient_loss_fn: "grad"
    valid_range: 0.98
  point: null
  track: null

# ── Optimizer ─────────────────────────────────────────────────────────────────
# The optimizer operates only on text_encoder (non-CLIP) + head params.
# Aggregator and CLIP have requires_grad=False throughout.
optim:
  param_group_modifiers: False

  optimizer:
    _target_: torch.optim.AdamW
    lr: 3e-4
    weight_decay: 1e-2
    betas: [0.9, 0.999]

  frozen_module_names: null   # freezing is handled inside VGGTTextOnly.__init__

  amp:
    enabled: False
    amp_dtype: bfloat16

  gradient_clip:
    _target_: train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["text_encoder"]
        max_norm: 1.0
        norm_type: 2

  options: null
  # Uncomment to enable cosine warm-up decay:
  # options:
  #   lr:
  #     - scheduler:
  #         _target_: fvcore.common.param_scheduler.CompositeParamScheduler
  #         schedulers:
  #           - _target_: fvcore.common.param_scheduler.LinearParamScheduler
  #             start_value: 1e-6
  #             end_value: 3e-4
  #           - _target_: fvcore.common.param_scheduler.CosineParamScheduler
  #             start_value: 3e-4
  #             end_value: 1e-7
  #         lengths: [0.05, 0.95]
  #         interval_scaling: ['rescaled', 'rescaled']

# ── Distribution ──────────────────────────────────────────────────────────────
distributed:
  backend: nccl
  comms_dtype: null
  find_unused_parameters: False   # all trainable params are used in every forward pass

  timeout_mins: 30
  gradient_as_bucket_view: True
  bucket_cap_mb: 25
  broadcast_buffers: True

cuda:
  cudnn_deterministic: False
  cudnn_benchmark: False
  allow_tf32: True
